name: Deploy to CT 127

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  deploy:
    name: Deploy to Proxmox
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push backend
        run: |
          docker build -t ahproxmox/service-dashboard-backend:${{ github.ref_name }} \
                       -t ahproxmox/service-dashboard-backend:latest \
                       ./backend

      - name: Build and push frontend
        run: |
          docker build -t ahproxmox/service-dashboard-frontend:${{ github.ref_name }} \
                       -t ahproxmox/service-dashboard-frontend:latest \
                       ./frontend

      - name: Trigger deployment
        run: |
          echo "Deploy to CT 127"
          echo "Tag: ${{ github.ref_name }}"
          # Deployment commands would go here
